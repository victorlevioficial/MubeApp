name: Setup Flutter SDK
description: Install Flutter from official releases without relying on external GitHub Actions.

inputs:
  flutter-version:
    description: Flutter version to install.
    required: false
    default: ""
  channel:
    description: Flutter release channel.
    required: false
    default: stable

runs:
  using: composite
  steps:
    - name: Install Flutter SDK
      shell: bash
      run: |
        set -euo pipefail

        flutter_version="${{ inputs.flutter-version }}"
        channel="${{ inputs.channel }}"
        os_name="$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')"
        machine_arch="$(uname -m)"

        if [[ -z "$flutter_version" ]]; then
          flutter_version="$(
            python3 "$GITHUB_WORKSPACE/scripts/flutter_version.py" \
              --repo-root "$GITHUB_WORKSPACE"
          )"
        fi

        case "$machine_arch" in
          arm64|aarch64)
            arch_hint="arm64"
            ;;
          x86_64|amd64)
            arch_hint="x64"
            ;;
          *)
            arch_hint=""
            ;;
        esac

        case "$os_name" in
          linux)
            releases_json_url="https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json"
            ;;
          macos)
            releases_json_url="https://storage.googleapis.com/flutter_infra_release/releases/releases_macos.json"
            ;;
          *)
            echo "Unsupported runner OS: ${RUNNER_OS}"
            exit 1
            ;;
        esac

        install_root="$RUNNER_TEMP/flutter-sdk-${flutter_version}-${os_name}-${arch_hint:-unknown}"
        flutter_root="$install_root/flutter"

        if [[ ! -x "$flutter_root/bin/flutter" ]]; then
          releases_json="$RUNNER_TEMP/flutter-releases-${os_name}.json"
          curl -fsSL "$releases_json_url" -o "$releases_json"

          archive_url="$(
            python3 "$GITHUB_ACTION_PATH/resolve_flutter_archive.py" \
              "$releases_json" \
              "$flutter_version" \
              "$channel" \
              "$arch_hint"
          )"

          archive_name="$(basename "$archive_url")"
          archive_path="$RUNNER_TEMP/$archive_name"

          rm -rf "$install_root"
          mkdir -p "$install_root"

          curl -fsSL "$archive_url" -o "$archive_path"

          case "$archive_path" in
            *.tar.xz)
              tar -xJf "$archive_path" -C "$install_root"
              ;;
            *.zip)
              unzip -q "$archive_path" -d "$install_root"
              ;;
            *)
              echo "Unsupported Flutter archive format: $archive_path"
              exit 1
              ;;
          esac
        fi

        echo "$flutter_root/bin" >> "$GITHUB_PATH"
        echo "FLUTTER_ROOT=$flutter_root" >> "$GITHUB_ENV"

        "$flutter_root/bin/flutter" config --no-analytics
        "$flutter_root/bin/flutter" --version
        python3 "$GITHUB_WORKSPACE/scripts/flutter_version.py" \
          --repo-root "$GITHUB_WORKSPACE" \
          --check-current \
          --current-version "$("$flutter_root/bin/flutter" --version | head -n1)"

        if [[ "$os_name" == "macos" ]]; then
          "$flutter_root/bin/flutter" precache --ios
        fi
