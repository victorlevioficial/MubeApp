name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.38.6"

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: Get dependencies
        run: flutter pub get --enforce-lockfile

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test scripts

      - name: Analyze project source
        run: flutter analyze --fatal-infos lib test

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: Get dependencies
        run: flutter pub get --enforce-lockfile

      - name: Verify text encoding (mojibake guard)
        run: flutter test test/unit/quality/mojibake_guard_test.dart

      - name: Run stable tests (unit + widget + routing + src)
        run: flutter test test/unit test/widget test/routing test/src --coverage

      - name: Run integration tests (informative on PR)
        if: github.event_name == 'pull_request'
        run: flutter test test/integration
        continue-on-error: true

      - name: Run integration tests (blocking on push)
        if: github.event_name == 'push'
        run: flutter test test/integration

      - name: Install Codecov CLI
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov --version

      - name: Upload coverage
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          ./codecov --verbose upload-process \
            --disable-search \
            --file coverage/lcov.info \
            --name "flutter-tests-${GITHUB_RUN_ID}"
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.event_name == 'push'
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Get dependencies
        run: flutter pub get --enforce-lockfile

      - name: Restore Android Firebase config
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
          elif [ -n "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" ]; then
            printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          else
            echo "Missing Android Firebase config secret. Set ANDROID_GOOGLE_SERVICES_JSON or ANDROID_GOOGLE_SERVICES_JSON_BASE64 in GitHub Actions secrets."
            exit 1
          fi

      - name: Restore Android signing config
        env:
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
          ANDROID_KEY_PROPERTIES_BASE64: ${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEYSTORE_JKS_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_JKS_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEY_PROPERTIES" ]; then
            printf '%s' "$ANDROID_KEY_PROPERTIES" > android/key.properties
          elif [ -n "$ANDROID_KEY_PROPERTIES_BASE64" ]; then
            printf '%s' "$ANDROID_KEY_PROPERTIES_BASE64" | base64 --decode > android/key.properties
          else
            echo "Missing Android signing secret. Set ANDROID_KEY_PROPERTIES or ANDROID_KEY_PROPERTIES_BASE64 in GitHub Actions secrets."
            exit 1
          fi

          keystore_base64="${ANDROID_UPLOAD_KEYSTORE_BASE64:-$ANDROID_UPLOAD_KEYSTORE_JKS_BASE64}"
          if [ -z "$keystore_base64" ]; then
            echo "Missing Android keystore secret. Set ANDROID_UPLOAD_KEYSTORE_BASE64 or ANDROID_UPLOAD_KEYSTORE_JKS_BASE64 in GitHub Actions secrets."
            exit 1
          fi

          printf '%s' "$keystore_base64" | base64 --decode > android/app/upload-keystore.jks
          cp android/app/upload-keystore.jks android/upload-keystore.jks
          sed -i 's/\r$//' android/key.properties
          grep -v '^storeFile=' android/key.properties > android/key.properties.tmp || true
          printf 'storeFile=upload-keystore.jks\n' >> android/key.properties.tmp
          mv android/key.properties.tmp android/key.properties

      - name: Build APK
        env:
          GOOGLE_VISION_API_KEY: ${{ secrets.GOOGLE_VISION_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Missing repository secret: GOOGLE_MAPS_API_KEY"
            exit 1
          fi

          build_args=(
            build
            apk
            --release
            "--dart-define=GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}"
          )

          if [ -n "$GOOGLE_VISION_API_KEY" ]; then
            build_args+=("--dart-define=GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}")
          fi

          flutter "${build_args[@]}"

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build-ios:
    name: Build iOS (No Codesign)
    runs-on: macos-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: Get dependencies
        run: flutter pub get --enforce-lockfile

      - name: Restore iOS Firebase config
        env:
          IOS_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
          IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          GOOGLE_SERVICE_INFO_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_BASE64 }}
        run: |
          if [ -n "$IOS_GOOGLE_SERVICE_INFO_PLIST" ]; then
            printf '%s' "$IOS_GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
          elif [ -n "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            printf '%s' "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
          elif [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
          elif [ -n "$GOOGLE_SERVICE_INFO_BASE64" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
          else
            echo "Missing iOS Firebase config secret. Set IOS_GOOGLE_SERVICE_INFO_PLIST or IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 in GitHub Actions secrets."
            exit 1
          fi

      - name: Build iOS without code signing
        env:
          GOOGLE_VISION_API_KEY: ${{ secrets.GOOGLE_VISION_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Missing repository secret: GOOGLE_MAPS_API_KEY"
            exit 1
          fi

          build_args=(
            build
            ios
            --release
            --no-codesign
            "--dart-define=GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}"
          )

          if [ -n "$GOOGLE_VISION_API_KEY" ]; then
            build_args+=("--dart-define=GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}")
          fi

          flutter "${build_args[@]}"

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: Get dependencies
        run: flutter pub get --enforce-lockfile

      - name: Check for outdated dependencies
        run: flutter pub outdated
        continue-on-error: true

      - name: Check for API keys in code
        run: |
          matches=$(rg -n "AIzaSy" lib scripts --glob "*.dart" --glob "!lib/firebase_options.dart" || true)
          if [ -n "$matches" ]; then
            echo "Potential API keys found in non-generated Dart code:"
            echo "$matches"
            exit 1
          fi
          echo "No hardcoded API keys found outside generated Firebase config."
