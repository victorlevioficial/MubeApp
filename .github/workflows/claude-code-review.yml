name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    if: |
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Claude workflow changes
        id: claude-workflow-changes
        shell: bash
        run: |
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"

          if grep -Eq '^\.github/workflows/claude(-code-review)?\.yml$' <<< "$changed_files"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Claude workflow changed; skipping Claude action because workflow validation requires default-branch parity."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code Review
        id: claude-review
        if: steps.claude-workflow-changes.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      - name: Skip Claude review for workflow changes
        if: steps.claude-workflow-changes.outputs.skip == 'true'
        run: echo "Skipped Claude review because this PR changes Claude workflow files."
