<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mube Login Capture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
     <link
       href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Poppins:wght@600;700&display=swap"
       rel="stylesheet"
     />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
      :root {
        --background: #0a0a0a;
        --surface: #141414;
        --surface-highlight: #292929;
        --border: #383838;
        --primary: #e8466c;
        --primary-pressed: #d13f61;
        --text-primary: #ffffff;
        --text-secondary: #b3b3b3;
        --text-tertiary: #8a8a8a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top center, rgba(232, 70, 108, 0.11), transparent 32%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 18%),
          var(--background);
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
      }

      .page {
        width: 1440px;
        min-height: 1200px;
        margin: 0 auto;
        padding: 72px 24px 48px;
        position: relative;
      }

      .content {
        width: 480px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      .logo {
        display: block;
        width: 178px;
        height: auto;
        margin: 0 auto;
      }

      h1 {
        margin: 32px 0 12px;
        font-family: "Poppins", sans-serif;
        font-size: 32px;
        line-height: 1.2;
        letter-spacing: -1px;
        font-weight: 700;
        text-align: center;
      }

      .subtitle {
        margin: 0;
        color: var(--text-secondary);
        text-align: center;
        font-size: 16px;
        line-height: 1.5;
        font-weight: 500;
      }

      .section-gap-lg {
        height: 48px;
      }

      .field-group + .field-group {
        margin-top: 24px;
      }

      .field-label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
      }

      .field {
        height: 48px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
      }

      .field svg {
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
        color: var(--text-tertiary);
      }

      .field span {
        color: var(--text-tertiary);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.4;
      }

      .forgot-link {
        margin-top: 16px;
        text-align: right;
        font-size: 14px;
        font-weight: 600;
        color: var(--primary);
      }

      .primary-button {
        margin-top: 32px;
        width: 100%;
        height: 56px;
        border: none;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--primary), var(--primary-pressed));
        color: var(--text-primary);
        font-family: "Poppins", sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .divider {
        margin: 32px 0;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .divider-line {
        height: 1px;
        flex: 1;
        background: var(--border);
      }

      .divider-text {
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
      }

      .social-stack {
        display: grid;
        gap: 16px;
      }

      .social-button {
        height: 48px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--text-primary);
        font-size: 16px;
        font-weight: 500;
      }

      .social-button svg {
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
      }

      .register {
        margin-top: 48px;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .register strong {
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        color: var(--primary);
      }
    </style>
  </head>
