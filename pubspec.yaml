name: mube
description: "Mube - Conectando Músicos" # matchpoint iOS crash fix
publish_to: 'none'
version: 1.6.19+155

# Scripts úteis para build
# Para gerar um build de release Android:
#   flutter build apk --release
#   flutter build appbundle --release
#
# Para gerar um build de release iOS:
#   flutter build ios --release
#
# Para atualizar a versão, modifique o campo version acima:
#   version: MAJOR.MINOR.PATCH+BUILD_NUMBER
#   Exemplo: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Architecture & State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  riverpod: ^3.0.3
  go_router: ^17.0.1 # Intermediate update
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  
  # Firebase (Updated for Flutter 3.38+)
  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1
  firebase_auth: ^6.1.3
  google_sign_in: ^7.2.0
  firebase_messaging: ^16.1.0
  
  # UI & Assets
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.3
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  uuid: ^4.2.2
  geolocator: ^14.0.2
  
  # Utilities
  shared_preferences: ^2.5.4
  mask_text_input_formatter: ^2.9.0
  http: ^1.6.0
  font_awesome_flutter: ^10.12.0
  firebase_storage: ^13.0.5
  image_picker: ^1.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_cropper: ^11.0.0
  flutter_image_compress: ^2.4.0
  video_compress: ^3.1.4
  video_player: ^2.11.0
  flutter_reorderable_grid_view: ^5.5.2
  flutter_native_splash: ^2.4.7
  url_launcher: ^6.3.2
  package_info_plus: ^8.3.1

  path: ^1.9.1
  path_provider: ^2.1.5
  meta: ^1.17.0
  diacritic: ^0.1.6
  fpdart: ^1.2.0
  firebase_app_check: ^0.4.1+4
  like_button: ^2.1.0
  flutter_cache_manager: ^3.4.1
  cloud_functions: ^6.0.6
  timeago: ^3.7.1
  flutter_card_swiper: ^7.2.0
  google_nav_bar: 5.0.7
  easy_refresh: ^3.4.0
  flutter_local_notifications: ^17.2.3
  # bitsdojo_window (Desktop only if needed, removed for mobile MVP)


  flutter_markdown: ^0.7.7+1
  printing: ^5.14.2
  share_plus: ^12.0.1
  pdf: ^3.11.3
  in_app_review: ^2.0.11
  firebase_analytics: ^12.1.2
  firebase_crashlytics: ^5.0.7
  firebase_performance: ^0.11.1+5
  connectivity_plus: ^7.0.0
  flutter_native_video_trimmer: ^1.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  
  # Testing
  mockito: ^5.4.5
  faker: ^2.2.0
  patrol: ^4.1.1
  
  # Generators
  build_runner: ^2.10.5
  riverpod_generator: ^3.0.3
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  
  # Lints
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  window_manager: ^0.5.1
  fake_cloud_firestore: ^4.0.1



  cloud_firestore_platform_interface: any
  network_image_mock: ^2.1.1
  firebase_auth_platform_interface: any
  mocktail: ^1.0.4
  firebase_core_platform_interface: any
  cloud_functions_platform_interface: any
  flutter_local_notifications_platform_interface: ^7.2.0

dependency_overrides:
  firebase_storage:
    path: third_party/firebase_storage
  video_compress:
    path: third_party/video_compress
  flutter_native_video_trimmer:
    path: third_party/flutter_native_video_trimmer

flutter:
  uses-material-design: true
  generate: true  # Enable localization code generation
  
  assets:
    - assets/images/logos_svg/logo_horizontal.svg
    - assets/images/logos_png/logo_vertical.png
    - assets/images/logos_png/logo_vertical_splash_small.png
    - assets/images/icons/apple.svg
    - assets/images/icons/applemusic.svg
    - assets/images/icons/deezer.svg
    - assets/images/icons/google.svg
    - assets/images/icons/search_prefilter_keyboard.svg
    - assets/images/icons/spotify.svg
    - assets/images/icons/youtubemusic.svg
    - assets/images/app_icon/playstore.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon/playstore.png" # AppAssets.appIconPlaystorePng
  image_path_ios: "assets/images/app_icon/appstore.png" # AppAssets.appIconAppstorePng
  remove_alpha_ios: true
  adaptive_icon_background: "#0A0A0A" # AppColors.background
  adaptive_icon_foreground: "assets/images/app_icon/playstore.png" # AppAssets.appIconPlaystorePng

flutter_native_splash:
  # Keep splash values aligned with AppColors.background and AppAssets.
  color: "#0A0A0A"
  image: "assets/images/logos_png/logo_vertical_splash_small.png"
  android_12:
    image: "assets/images/logos_png/logo_vertical_splash_small.png"
    icon_background_color: "#0A0A0A"
  # Adicionado para evitar que a logo fique gigante em telas grandes
  ios_content_mode: scaleAspectFit
  android_gravity: center
  fullscreen: false
