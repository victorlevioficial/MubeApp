<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Mube Brand Outro</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-shift-x: 0px;
      --bg-shift-y: 0px;
      --glow-a-x: 14%;
      --glow-a-y: 16%;
      --glow-b-x: 84%;
      --glow-b-y: 74%;
      --glow-c-scale: 1;
      --lockup-y: 0px;
      --lockup-scale: 1;
      --icon-scale: 0.84;
      --icon-rotate: -8deg;
      --icon-y: 24px;
      --icon-opacity: 0;
      --glyph-y: 32px;
      --glyph-scale: 0.9;
      --glyph-opacity: 0;
      --ring-scale: 0.92;
      --ring-rotate: -40deg;
      --ring-opacity: 0;
      --ring-sweep-opacity: 0;
      --orb-opacity: 0;
      --wordmark-clip: 0%;
      --wordmark-opacity: 0;
      --wordmark-y: 36px;
      --wordmark-blur: 14px;
      --wordmark-scale: 0.96;
      --sheen-x: -180%;
      --sheen-opacity: 0;
      --frame-opacity: 1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #070709;
      font-family: sans-serif;
    }

    body {
      position: relative;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background:
        radial-gradient(circle at calc(50% + var(--bg-shift-x)) calc(42% + var(--bg-shift-y)), rgba(232, 70, 108, 0.16), rgba(232, 70, 108, 0) 23%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0) 38%),
        linear-gradient(180deg, #050507 0%, #08080b 38%, #070709 100%);
      opacity: var(--frame-opacity);
    }

    .canvas::before,
    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .canvas::before {
      background:
        linear-gradient(90deg, transparent 0, rgba(255, 255, 255, 0.045) 6%, transparent 10%) 172px 0 / 2px 100% no-repeat,
        linear-gradient(90deg, transparent 0, rgba(255, 255, 255, 0.038) 6%, transparent 10%) 906px 0 / 2px 100% no-repeat;
      opacity: 0.28;
      filter: blur(0.7px);
    }

    .canvas::after {
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.1) 1px, transparent 0);
      background-size: 8px 8px;
      opacity: 0.035;
      mix-blend-mode: screen;
      mask-image: radial-gradient(circle at center, black 58%, transparent 100%);
    }

    .glow {
      position: absolute;
      border-radius: 999px;
      filter: blur(90px);
      pointer-events: none;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
    }

    .glow-a {
      width: 360px;
      height: 360px;
      left: var(--glow-a-x);
      top: var(--glow-a-y);
      background: rgba(232, 70, 108, 0.18);
    }

    .glow-b {
      width: 420px;
      height: 420px;
      left: var(--glow-b-x);
      top: var(--glow-b-y);
      background: rgba(232, 70, 108, 0.14);
    }

    .glow-c {
      width: 280px;
      height: 280px;
      left: 50%;
      top: 47%;
      background: rgba(255, 255, 255, 0.08);
      opacity: var(--orb-opacity);
      transform: translate(-50%, -50%) scale(var(--glow-c-scale));
      filter: blur(110px);
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 50%, rgba(0, 0, 0, 0.34) 86%, rgba(0, 0, 0, 0.62) 100%);
    }

    .stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 200px 120px;
    }

    .lockup {
      position: relative;
      width: 660px;
      height: 820px;
      transform: translateY(var(--lockup-y)) scale(var(--lockup-scale));
      transform-origin: center center;
    }

    .orbital-ring,
    .orbital-track {
      position: absolute;
      left: 50%;
      top: 268px;
      width: 392px;
      height: 392px;
      transform: translate(-50%, -50%) scale(var(--ring-scale)) rotate(var(--ring-rotate));
      border-radius: 50%;
      pointer-events: none;
    }

    .orbital-track {
      border: 1px solid rgba(255, 255, 255, 0.07);
      opacity: calc(var(--ring-opacity) * 0.55);
    }

    .orbital-ring {
      opacity: var(--ring-opacity);
      background:
        conic-gradient(
          from 120deg,
          transparent 0deg,
          rgba(232, 70, 108, 0.0) 14deg,
          rgba(232, 70, 108, 0.8) 118deg,
          rgba(255, 255, 255, 0.95) 148deg,
          rgba(232, 70, 108, 0.4) 170deg,
          transparent 212deg
        );
      -webkit-mask: radial-gradient(circle, transparent 72%, black 74%, black 79%, transparent 81%);
      mask: radial-gradient(circle, transparent 72%, black 74%, black 79%, transparent 81%);
      filter: blur(1px);
    }

    .orbital-dot {
      position: absolute;
      left: 50%;
      top: 268px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: white;
      box-shadow:
        0 0 14px rgba(255, 255, 255, 0.95),
        0 0 24px rgba(232, 70, 108, 0.8);
      opacity: var(--ring-sweep-opacity);
      transform:
        translate(-50%, -50%)
        rotate(var(--ring-rotate))
        translateY(-176px);
    }

    .icon-shell {
      position: absolute;
      left: 50%;
      top: 268px;
      width: 332px;
      height: 332px;
      transform:
        translate(-50%, -50%)
        translateY(var(--icon-y))
        scale(var(--icon-scale))
        rotate(var(--icon-rotate));
      transform-origin: center center;
      opacity: var(--icon-opacity);
      filter:
        drop-shadow(0 16px 42px rgba(0, 0, 0, 0.45))
        drop-shadow(0 0 64px rgba(232, 70, 108, 0.22));
    }

    .icon-backlight {
      position: absolute;
      left: 50%;
      top: 268px;
      width: 308px;
      height: 308px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 70, 108, 0.32), rgba(232, 70, 108, 0) 68%);
      transform: translate(-50%, -50%) scale(calc(0.92 + var(--icon-scale) * 0.18));
      opacity: calc(var(--icon-opacity) * 0.8);
      filter: blur(30px);
      pointer-events: none;
    }

    .icon-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .icon-circle {
      fill: #e8466c;
    }

    .icon-stroke {
      fill: none;
      stroke: rgba(255, 255, 255, 0.24);
      stroke-width: 12;
    }

    .icon-glyph {
      fill: white;
      transform-box: fill-box;
      transform-origin: center center;
      transform: translateY(var(--glyph-y)) scale(var(--glyph-scale));
      opacity: var(--glyph-opacity);
      filter: drop-shadow(0 10px 24px rgba(255, 255, 255, 0.12));
    }

    .icon-highlight {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0) 34%) top left / 78% 78% no-repeat,
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0) 36%) top center / 100% 62% no-repeat;
      mix-blend-mode: screen;
      opacity: calc(var(--icon-opacity) * 0.72);
      pointer-events: none;
    }

    .wordmark-wrap {
      position: absolute;
      left: 50%;
      top: 516px;
      width: 520px;
      height: 164px;
      transform:
        translateX(-50%)
        translateY(var(--wordmark-y))
        scale(var(--wordmark-scale));
      opacity: var(--wordmark-opacity);
      filter: blur(var(--wordmark-blur));
      clip-path: inset(0 calc(100% - var(--wordmark-clip)) 0 0);
    }

    .wordmark-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.34));
    }

    .wordmark-svg path {
      fill: white;
    }

    .sheen {
      position: absolute;
      left: 50%;
      top: 448px;
      width: 560px;
      height: 320px;
      transform: translateX(-50%);
      overflow: hidden;
      pointer-events: none;
      opacity: var(--sheen-opacity);
      mix-blend-mode: screen;
      filter: blur(4px);
      mask-image: linear-gradient(180deg, transparent 0%, black 20%, black 80%, transparent 100%);
    }

    .sheen::before {
      content: "";
      position: absolute;
      inset: -12% -30%;
      background: linear-gradient(
        108deg,
        transparent 20%,
        rgba(255, 255, 255, 0.0) 34%,
        rgba(255, 255, 255, 0.86) 48%,
        rgba(255, 255, 255, 0.0) 60%,
        transparent 78%
      );
      transform: translateX(var(--sheen-x));
    }
  </style>
</head>

  <script>
    const root = document.documentElement;

    function clamp(value, min = 0, max = 1) {
      return Math.min(max, Math.max(min, value));
    }

    function mix(start, end, progress) {
      return start + (end - start) * progress;
    }

    function easeOutCubic(x) {
      return 1 - Math.pow(1 - x, 3);
    }

    function easeInOutCubic(x) {
      return x < 0.5
        ? 4 * x * x * x
        : 1 - Math.pow(-2 * x + 2, 3) / 2;
    }

    function easeOutBack(x) {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
    }

    function segment(t, start, end, easing = easeInOutCubic) {
      const raw = clamp((t - start) / (end - start));
      return easing(raw);
    }

    function setVar(name, value) {
      root.style.setProperty(name, value);
    }

    function renderAt(t) {
      const iconIn = segment(t, 0.06, 0.84, easeOutBack);
      const glyphIn = segment(t, 0.16, 0.94, easeOutCubic);
      const ringIn = segment(t, 0.0, 0.78, easeOutCubic);
      const wordIn = segment(t, 0.86, 1.6, easeOutCubic);
      const sheenIn = segment(t, 1.52, 2.18, easeInOutCubic);
      const settle = segment(t, 0.46, 1.52, easeInOutCubic);
      const holdPulse = Math.sin(clamp((t - 1.7) / 1.8, 0, 1) * Math.PI * 2);

      const iconScale = mix(0.72, 1.0, iconIn) + Math.sin(settle * Math.PI) * 0.018;
      const iconRotate = mix(-10, 0, segment(t, 0.0, 0.96, easeOutBack));
      const iconY = mix(62, 0, segment(t, 0.02, 0.92, easeOutCubic));
      const iconOpacity = segment(t, 0.0, 0.32, easeOutCubic);

      const glyphY = mix(44, 0, glyphIn);
      const glyphScale = mix(0.86, 1.0, glyphIn);
      const glyphOpacity = segment(t, 0.14, 0.54, easeOutCubic);

      const ringScale = mix(0.84, 1.0, ringIn);
      const ringRotate = mix(-68, 22, segment(t, 0.0, 2.5, easeOutCubic));
      const ringOpacity = segment(t, 0.06, 0.42, easeOutCubic) * 0.95;
      const ringSweepOpacity =
        segment(t, 0.18, 0.48, easeOutCubic) *
        (1 - segment(t, 1.12, 1.46, easeOutCubic));

      const lockupY = mix(42, 0, segment(t, 0.0, 1.0, easeOutCubic));
      const lockupScale = mix(0.97, 1.0, segment(t, 0.0, 1.0, easeOutCubic));

      const wordClip = mix(0, 100, wordIn);
      const wordOpacity = segment(t, 0.9, 1.26, easeOutCubic);
      const wordY = mix(38, 0, wordIn);
      const wordBlur = mix(16, 0, segment(t, 0.9, 1.42, easeOutCubic));
      const wordScale = mix(0.94, 1.0, wordIn);

      const sheenOpacity = Math.sin(Math.PI * sheenIn) * 0.82;
      const sheenX = mix(-170, 160, sheenIn);

      const orbOpacity = segment(t, 0.0, 0.45, easeOutCubic) * 0.92 + Math.max(holdPulse, 0) * 0.06;
      const glowScale = mix(0.82, 1.12, segment(t, 0.0, 1.1, easeOutCubic));

      setVar("--icon-scale", iconScale.toFixed(4));
      setVar("--icon-rotate", `${iconRotate.toFixed(3)}deg`);
      setVar("--icon-y", `${iconY.toFixed(2)}px`);
      setVar("--icon-opacity", iconOpacity.toFixed(4));

      setVar("--glyph-y", `${glyphY.toFixed(2)}px`);
      setVar("--glyph-scale", glyphScale.toFixed(4));
      setVar("--glyph-opacity", glyphOpacity.toFixed(4));

      setVar("--ring-scale", ringScale.toFixed(4));
      setVar("--ring-rotate", `${ringRotate.toFixed(3)}deg`);
      setVar("--ring-opacity", ringOpacity.toFixed(4));
      setVar("--ring-sweep-opacity", ringSweepOpacity.toFixed(4));

      setVar("--lockup-y", `${lockupY.toFixed(2)}px`);
      setVar("--lockup-scale", lockupScale.toFixed(4));

      setVar("--wordmark-clip", `${wordClip.toFixed(3)}%`);
      setVar("--wordmark-opacity", wordOpacity.toFixed(4));
      setVar("--wordmark-y", `${wordY.toFixed(2)}px`);
      setVar("--wordmark-blur", `${wordBlur.toFixed(2)}px`);
      setVar("--wordmark-scale", wordScale.toFixed(4));

      setVar("--sheen-opacity", sheenOpacity.toFixed(4));
      setVar("--sheen-x", `${sheenX.toFixed(2)}%`);

      setVar("--orb-opacity", orbOpacity.toFixed(4));
      setVar("--glow-c-scale", glowScale.toFixed(4));

      setVar("--glow-a-x", `${mix(14, 18, segment(t, 0.0, 4.0, easeInOutCubic)).toFixed(2)}%`);
      setVar("--glow-a-y", `${mix(15, 18.5, segment(t, 0.0, 4.0, easeInOutCubic)).toFixed(2)}%`);
      setVar("--glow-b-x", `${mix(84, 80, segment(t, 0.0, 4.0, easeInOutCubic)).toFixed(2)}%`);
      setVar("--glow-b-y", `${mix(76, 70, segment(t, 0.0, 4.0, easeInOutCubic)).toFixed(2)}%`);
      setVar("--bg-shift-x", `${mix(-22, 18, segment(t, 0.0, 4.0, easeInOutCubic)).toFixed(2)}px`);
      setVar("--bg-shift-y", `${mix(-12, 16, segment(t, 0.0, 4.0, easeInOutCubic)).toFixed(2)}px`);
    }

    function getTimeFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const explicit = params.get("t");
      if (explicit !== null) {
        return Number(explicit);
      }
      return null;
    }

    function boot() {
      const explicitTime = getTimeFromQuery();
      if (explicitTime !== null && !Number.isNaN(explicitTime)) {
        renderAt(explicitTime);
        return;
      }

      const duration = 4;
      const start = performance.now();
      function tick(now) {
        const elapsed = ((now - start) / 1000) % duration;
        renderAt(elapsed);
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    boot();
    window.__renderAt = renderAt;
  </script>
</body>
</html>
